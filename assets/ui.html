<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/vendor/github-dark.min.css">
    <script src="/assets/vendor/marked.min.js"></script>
    <script src="/assets/vendor/highlight.min.js"></script>
</head>
<body>
    <!-- Initialization overlay -->
    <div class="init-overlay" id="initOverlay" style="display:none">
        <div class="init-content">
            <div class="init-title">Basil 🌿</div>
            <div class="init-progress-ring indeterminate" id="initRing">
                <svg viewBox="0 0 120 120">
                    <circle class="ring-bg" cx="60" cy="60" r="52"/>
                    <circle class="ring-fg" id="initRingFg" cx="60" cy="60" r="52"/>
                </svg>
                <div class="init-progress-pct" id="initPct"></div>
            </div>
            <div class="init-message" id="initMessage">Connecting...</div>
            <div class="init-error" id="initError" style="display:none"></div>
            <button class="init-details-toggle" id="initDetailsToggle" style="display:none">Show details</button>
            <div class="init-logs" id="initLogs"></div>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <div class="status-circle" id="connectionStatus" title="Connecting..."></div>
            <button id="planModeBtn" class="plan-mode-btn locked" title="Plan Mode (read-only)">
                <span class="lock-icon">✋</span>
            </button>
            <div class="session-picker">
                <button class="session-btn" id="sessionBtn">
                    <span id="sessionLabel">New Session</span>
                    <span>▼</span>
                </button>
                <div class="session-dropdown" id="sessionDropdown">
                    <div class="session-dropdown-header">
                        <span>Sessions</span>
                        <button class="new-session-btn" id="newSessionBtn">+ New</button>
                    </div>
                    <div id="sessionList">
                        <div class="no-sessions">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="project-name" id="projectName"></div>
        <h1>Basil <span class="logo">🌿</span></h1>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="icon">💬</div>
            <p>Start a conversation with Claude</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <div class="scroll-buttons">
                <button class="scroll-btn" id="scrollUpBtn" title="Scroll to top">↑</button>
                <button class="scroll-btn" id="scrollDownBtn" title="Scroll to bottom">↓</button>
            </div>
            <textarea id="messageInput" placeholder="Type your message..." rows="1" autofocus></textarea>
            <button id="sendBtn">
                <span class="btn-text">Send</span>
                <span class="btn-icon">→</span>
            </button>
        </div>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
